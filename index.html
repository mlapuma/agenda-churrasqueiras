<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda de Churrasqueiras - Condominio Terra Branca</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="titulo">
      <div>
        <p class="eyebrow">Condominio Terra Branca</p>
        <h1 id="titulo">Agenda da Churrasqueira</h1>
        <p class="subtitle">Selecione uma data, escolha a casa e registre o uso do salao da churrasqueira.</p>
      </div>
      <div class="status-box">
        <span id="totalReservas">0</span>
        <small>reservas cadastradas</small>
      </div>
    </section>

    <section class="content">
      <form class="booking-form" id="bookingForm">
        <h2>Nova reserva</h2>

        <label for="dataReserva">Data da reserva</label>
        <input type="date" id="dataReserva" name="dataReserva" required>

        <label for="casa">Casa</label>
        <select id="casa" name="casa" required>
          <option value="">Selecione uma casa</option>
        </select>

        <button type="submit">Agendar churrasqueira</button>
        <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>

        <div class="copy-panel" id="copyPanel" hidden>
          <label for="mensagemReservaInline">Mensagem para copiar</label>
          <textarea id="mensagemReservaInline" rows="5" readonly></textarea>
          <button class="copy-button" id="copiarMensagemInline" type="button">Copiar mensagem</button>
        </div>
      </form>

      <section class="schedule" aria-labelledby="listaTitulo">
        <div class="schedule-header">
          <div>
            <h2 id="listaTitulo">Reservas</h2>
            <p id="syncStatus">Carregando reservas...</p>
          </div>
          <button class="ghost-button" id="atualizarReservas" type="button">Atualizar</button>
        </div>

        <ul class="booking-list" id="bookingList"></ul>
        <p class="empty-state" id="emptyState">Nenhuma reserva cadastrada ainda.</p>
      </section>
    </section>
  </main>

  <div class="message-modal" id="messageModal" hidden>
    <div class="message-dialog" role="dialog" aria-modal="true" aria-labelledby="messageTitle">
      <div class="message-header">
        <h2 id="messageTitle">Mensagem para o grupo</h2>
        <button class="icon-button" id="fecharMensagem" type="button" aria-label="Fechar">x</button>
      </div>

      <label for="mensagemReserva">Copie e envie no grupo do condominio</label>
      <textarea id="mensagemReserva" rows="5" readonly></textarea>

      <div class="message-actions">
        <button class="copy-button" id="copiarMensagem" type="button">Copiar mensagem</button>
        <button class="ghost-button" id="okMensagem" type="button">Concluir</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
